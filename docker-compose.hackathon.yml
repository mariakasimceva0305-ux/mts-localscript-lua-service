# Строгий режим проверки хакатона LocalScript (не меняет дефолты базового docker-compose.yml).
# Имя проекта и volumes наследуются из docker-compose.yml (name: localscript).
#
# Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.hackathon.yml up --build
#
# Задаёт для соответствия проверочным параметрам:
#   - api: CONTEXT_SIZE=4096, OLLAMA_NUM_PREDICT=256, OLLAMA_HTTP_TIMEOUT_S=240
#   - ollama: OLLAMA_NUM_PARALLEL=1 (один одновременный запрос на модель; см. документацию Ollama)
#
# Параметры num_ctx / num_predict задаются в HTTP-запросе api → Ollama (api/orchestrator.py)
# из переменных окружения контейнера api. Batch размера промпта в этом репозитории отдельно
# не конфигурируется: один POST /generate → один вызов /api/generate без stream.
services:
  ollama:
    environment:
      OLLAMA_NUM_PARALLEL: "1"

  api:
    environment:
      CONTEXT_SIZE: "4096"
      OLLAMA_NUM_PREDICT: "256"
      OLLAMA_HTTP_TIMEOUT_S: "240"
